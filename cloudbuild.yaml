steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/erad-pc-mall:$COMMIT_SHA
      - -t
      - europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/erad-pc-mall:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/erad-pc-mall:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/erad-pc-mall:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - erad-pc-mall-portfolio
      - --image
      - europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/erad-pc-mall:$COMMIT_SHA
      - --region
      - europe-west2
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"

images:
  - europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/erad-pc-mall:$COMMIT_SHA
  - europe-west2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/erad-pc-mall:latest

options:
  logging: CLOUD_LOGGING_ONLY
